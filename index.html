<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FranFunnel Widget</title>
    <script src="ZohoEmbededAppSDK.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; }
        #debug { font-size: 12px; word-break: break-all; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="debug">Waiting for PageLoad...</div>

    <script>
        ZOHO.embeddedApp.on("PageLoad", function(data) {
            document.getElementById("debug").textContent = "PageLoad data:\n" + JSON.stringify(data, null, 2);

            if (!data || !data.EntityId || !data.EntityId[0]) {
                document.getElementById("debug").textContent += "\n\nNo EntityId found!";
                return;
            }

            var recordId = data.EntityId[0];
            document.getElementById("debug").textContent += "\n\nAttempting getRecord with ID: " + recordId;

            ZOHO.CRM.API.getRecord({
                Entity: data.Entity || "Contacts",
                RecordID: recordId
            }).then(function(response) {
                document.getElementById("debug").textContent += "\n\nAPI Response:\n" + JSON.stringify(response, null, 2);
            }).catch(function(error) {
                document.getElementById("debug").textContent += "\n\nAPI Error:\n" + JSON.stringify(error, null, 2);
            });
        });

        ZOHO.embeddedApp.init();
    </script>
</body>
</html>
